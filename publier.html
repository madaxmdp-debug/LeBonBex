<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publier une annonce – LeBonBex</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f56b2a',
            'primary-dark': '#d4561f',
            secondary: '#1a1a2e',
            surface: '#f8f7f5',
          },
          fontFamily: { sans: ['Nunito', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-surface font-sans min-h-screen">

  <!-- HEADER -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <div class="bg-primary rounded-xl px-3 py-1">
          <span class="text-white font-extrabold text-lg tracking-tight">LeBon<span class="text-yellow-200">Bex</span></span>
        </div>
      </a>
      <a href="index.html" class="text-sm text-gray-500 hover:text-primary flex items-center gap-1 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Retour aux annonces
      </a>
    </div>
  </header>

  <!-- CONTENU -->
  <main class="max-w-2xl mx-auto px-4 py-8">

    <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8">

      <h1 class="text-2xl font-extrabold text-secondary mb-1">Publier une annonce</h1>
      <p class="text-gray-400 text-sm mb-6">Visible uniquement par les collègues.</p>

      <!-- Formulaire -->
      <form id="publierForm" class="space-y-5">

        <!-- Titre -->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Titre de l'annonce *</label>
          <input
            type="text"
            id="titre"
            placeholder="Ex: Vélo de course 21 vitesses"
            maxlength="100"
            required
            class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
          />
        </div>

        <!-- Catégorie + Prix côte à côte -->
        <div class="grid grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Catégorie *</label>
            <select
              id="categorie"
              required
              class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition bg-white"
            >
              <option value="">Choisir...</option>
              <option>Informatique</option>
              <option>Mobilier</option>
              <option>Vêtements</option>
              <option>Sports & Loisirs</option>
              <option>Électroménager</option>
              <option>Livres & BD</option>
              <option>Jeux & Jouets</option>
              <option>Auto / Moto</option>
              <option>Alimentation</option>
              <option>Services</option>
              <option>Autres</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Prix (€) *</label>
            <div class="relative">
              <input
                type="number"
                id="prix"
                placeholder="0"
                min="0"
                step="0.01"
                required
                class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
              />
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">€</span>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Description *</label>
          <textarea
            id="description"
            rows="5"
            placeholder="Décrivez votre article : état, dimensions, raison de la vente..."
            required
            maxlength="1500"
            class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition resize-none"
          ></textarea>
          <p class="text-right text-xs text-gray-400 mt-1"><span id="charCount">0</span>/1500</p>
        </div>

        <!-- Localisation -->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Localisation</label>
          <input
            type="text"
            id="localisation"
            placeholder="Ex: Paris 11e, Bâtiment B..."
            class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
          />
        </div>

        <!-- Contact -->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Contact (email ou Teams) *</label>
          <input
            type="text"
            id="contact"
            placeholder="prenom.nom@entreprise.fr"
            required
            class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
          />
        </div>

        <!--vendeur-->
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Vendeur *</label>
          <input
            type="text"
            id="vendeur"
            placeholder="Ton nom"
            required
            class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
         />
        </div>


        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Lien de l'image (optionnel)</label>
          <input
            type="text"
            id="imageUrlInput"
            placeholder="https://exemple.com/image.jpg"
            class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-primary transition"
          />
        </div>

        <!-- Bouton submit -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-primary hover:bg-primary-dark text-white font-extrabold py-3 rounded-xl text-base transition shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Publier l'annonce
        </button>

      </form>

      <!-- Message de succès (caché par défaut) -->
      <div id="successMsg" class="hidden text-center py-8">
        <div class="text-5xl mb-3">🎉</div>
        <h3 class="text-xl font-extrabold text-secondary mb-2">Annonce publiée !</h3>
        <p class="text-gray-400 text-sm mb-5">Votre annonce est maintenant visible par tous vos collègues.</p>
        <a href="index.html" class="inline-block bg-primary text-white font-bold px-6 py-3 rounded-xl hover:bg-primary-dark transition">
          Voir toutes les annonces
        </a>
      </div>

    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
